<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form 練習 - WebDev Notes</title>
    <link rel="stylesheet" href="../../../assets/css/main.css">
    <link rel="stylesheet" href="../../../assets/css/course-note.css">
    <style>
        /* --- 表單通用樣式 (Form) --- */
        form {
            width: 80%;
            /* border-collapse: collapse; */
            /* 重要：讓邊框合併 */
            margin: 2.5rem auto;
            padding: 5%;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            /* 配合圓角 */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            /* 增加陰影感 */

        }

        .grid-table td:hover,
        td:hover {
            background-color: #ffffff;
            color: var(--primary-dark);
            transform: scale(1.01);
            /* 輕微放大 */
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            /* 浮起陰影 */
            z-index: 10;
            /* 確保放大時不會被隔壁遮住 */
            cursor: pointer;
            border-radius: 4px;
            /* 浮起時給一點圓角 */
        }
    </style>
</head>

<body>
    <header class="header">
        <nav class="navbar">
            <div class="nav-container">
                <div class="logo">
                    <span class="logo-icon">📊</span>
                    <h1>WebDev Notes</h1>
                </div>
                <ul class="nav-links">
                    <li><a href="../../../index.html">首頁</a></li>
                    <li><a href="index.html">HTML 課程</a></li>
                </ul>
            </div>
        </nav>
    </header>
    <div class="ex">

        <div class="note-card">
            <h3>HTML Forms</h3>
            <div class="note-content">

                <div class="note-item">
                    <code>&lt;label&gt;</code>
                    <span>定義輸入欄位的<mark>標籤文字</mark>，點擊文字可聚焦至對應欄位</span>
                </div>
                <div class="note-item">
                    <code>&lt;input type="text"&gt;</code>
                    <span>建立單行的<mark>文字輸入框</mark>，讓使用者填寫資料</span>
                </div>
                <div class="note-item">
                    <code>name</code>
                    <span>定義傳送給後端程式時的<mark>參數名稱</mark> (Key)</span>
                </div>
                <div class="note-item">
                    <code>&lt;input type="submit"&gt; input:類型</code>
                    <span>定義<mark>提交按鈕</mark>，觸發傳送表單動作</span>
                </div>
            </div>
            <form action="/action_page.php">
                <label for="fname">First name:</label>
                <input type="text" id="fname" name="fname" value="John"><br>
                <label for="lname">Last name:</label>
                <input type="text" id="lname" name="lname" value="Doe"><br><br>
                <input type="submit" value="Submit">
            </form>

            <p>If you click the "Submit" button, the form-data will be sent to a page called "/action_page.php".</p>
        </div>


    </div>

</body>

</html>
