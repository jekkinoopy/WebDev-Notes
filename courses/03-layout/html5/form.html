<!doctype html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form 練習 - 努比的全端筆記</title>
    <link rel="stylesheet" href="../../../assets/css/main.css" />
    <link rel="stylesheet" href="../../../assets/css/course-note.css" />
    <style>
        /* 1. 基礎容器 */
        form {
            width: 90%;
            min-width: 800px;
            margin: 2rem auto;
            padding: 2rem;
            background: transparent;
            border-radius: 12px;
            /* box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05); */
        }


        /* 2. 核心：統一所有標題與內容的距離 (Label 5px Input) */
        .sechskies-form p {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 25px;
        }

        .form-title {
            text-align: center;
            margin-bottom: 3rem;
        }

        .form-title h1 {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--primary);
            display: inline-block;
            position: relative;
            padding: 0 30px;
            letter-spacing: 5px;
        }

        .form-title h1::after,
        .form-title h1::before {
            content: "💎";
            margin: 8px;
        }

        .form-title p {
            font-size: 1rem;
            color: var(--primary-dark);
            margin-top: 10px;
            font-weight: 500;
            letter-spacing: 2px;
        }

        .main-label {
            display: block;
            font-weight: 700;
            color: var(--primary-dark);
            margin: 0;
            /* 移除外距由 p 的 gap 控制 */
        }

        /* 3. 輸入框與圓角 */
        .sechskies-form input[type="text"],
        .sechskies-form input[type="url"],
        .sechskies-form input[type="tel"],
        .sechskies-form input[type="email"],
        .sechskies-form input[type="password"],
        .sechskies-form input[type="date"],
        .sechskies-form input[type="number"],
        .sechskies-form select,
        .sechskies-form textarea {
            width: 100%;
            padding: 12px;
            border: 1.5px solid var(--primary-dark);
            border-radius: 20px;
            font-size: 0.9rem;
            box-sizing: border-box;
            background-color: #fff;
            color: var(--primary-dark);
        }

        /* 4. 喜愛程度 (Range) 顏色與高度修正 */
        input[type="range"] {
            -webkit-appearance: none;
            /* 最重要！ 告訴瀏覽器「閉嘴，我要自己畫」，不然預設的灰色改不動。 */
            width: 100%;
            height: 30px;
            background: transparent;
            accent-color: var(--primary);
            /* 這是現代瀏覽器的一個捷徑，可以直接改拉桿主色（但在自定義樣式下效果有限）。 */
        }

        /* 這是指那一條長長的軌道。你設高度和背景色就在這。 */
        input[type="range"]::-webkit-slider-runnable-track {
            height: 10px;
            background: var(--primary);
            border-radius: 5px;
        }

        /* 這是指那個圓圓的滑塊（你可以點住拉動的那個按鈕）。 */
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: #fff;
            border: 3px solid var(--primary);
            margin-top: -5px;
            /* 因為 Chrome 的滑塊預設位置會跑掉，這是用來把圓圈圈校正到軌道中間的。 */
        }

        /* 5. 檔案上傳美化 */
        input[type="file"] {
            border-radius: 20px;
            cursor: pointer;
        }


        input[type="file"]::file-selector-button {
            background: white;
            color: var(--primary);
            border: 1px solid var(--primary);
            border-radius: 15px;
            padding: 5px 15px;
            cursor: pointer;
            font-weight: bold;
        }

        input[type="file"]::file-selector-button:hover {
            background: var(--primary);
            color: white;
        }

        /* 6. 按鈕組樣式 */
        .submit {
            margin-top: 50px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* 送出 (藍底白字) */
        input[type="submit"] {
            background-color: var(--primary) !important;
            color: var(--gray-100) !important;
            border: 2px solid var(--primary) !important;
            padding: 15px !important;
            border-radius: 50px !important;
            font-weight: 600 !important;
            cursor: pointer;
            width: 100% !important;
            transition: 0.3s;
        }

        input[type="submit"]:hover {
            background-color: var(--primary-dark) !important;
            border-color: var(--primary-dark) !important;
        }

        /* 重置 (白底藍字) */
        input[type="reset"] {
            background-color: var(--gray-100) !important;
            color: var(--primary) !important;
            border: 2px solid var(--primary) !important;
            padding: 15px !important;
            border-radius: 50px !important;
            font-weight: 600 !important;
            cursor: pointer;
            width: 100% !important;
            transition: 0.3s;
        }

        input[type="reset"]:hover {
            background-color: var(--danger) !important;
            border: 2px solid var(--danger) !important;
            color: var(--gray-100) !important;
        }

        /* 7. Fieldset & Legend (左右藍線) */
        fieldset {
            border: 2px solid var(--primary);
            background-color: transparent;
            border-radius: 50px;
            padding: 4rem;
            margin: 4rem 0;
        }

        legend {
            font-weight: 900;
            color: var(--primary);
            padding: 0 15px;
            font-size: 1.2rem;
            border-left: 5px solid var(--primary);
            border-right: 5px solid var(--primary);
            margin: auto;
        }

        .option-row {
            display: flex;
            /* gap: 15px; */
            flex-wrap: wrap;
            margin-top: 10px;
            justify-content: space-between;
        }

        .option-row.grid-3 {
            display: grid;
            /* 強制覆蓋 flex */
            grid-template-columns: repeat(3, 1fr);
            gap: 15px 10px;
        }

        .option-item {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            white-space: nowrap;
        }

        input[type="radio"],
        input[type="checkbox"] {
            width: auto !important;
            margin: 0 !important;
        }

        /* 1. 統一所有「標題」與「內容」的間距：全部鎖死為 5px */
        .sechskies-form p,
        .sechskies-form fieldset>div,
        .sechskies-form fieldset {
            display: flex;
            flex-direction: column;
            gap: 5px;
            /* 標題與框框的距離 */
            margin-bottom: 20px;
            /* 每個大題之間的距離 */
        }

        /* 2. 修正標題本身的 margin，不讓它亂撐距離 */
        .main-label {
            margin: 0 !important;
            display: block !important;
        }

        /* 3. 解決選擇檔案按鈕太醜 */


        /* 
        input[type="file"] {
            border: 2px dashed var(--primary-dark) !important;
            padding: 10px !important;
            border-radius: 15px !important;
        } */

        /* 5. 重置與送出並排：平分寬度、顏色對調 */
        .submit {
            display: flex !important;
            flex-direction: row !important;
            /* 橫向並排 */
        }

        .submit input {
            flex: 1 !important;
            padding: 15px !important;
            border-radius: 50px !important;
            font-weight: bold !important;
            cursor: pointer;
        }

        */ input[type="submit"] {
            width: 50%;
            background: var(--primary) !important;
            color: var(--gray-100) !important;
            border: none !important;
        }

        input[type="reset"] {
            background: var(--gray-100) !important;
            color: var(--primary) !important;
            border: 2px solid var(--primary) !important;
        }

        /* 6. 其他框線統一 */
        input[type="text"],
        input[type="url"],
        input[type="tel"],
        input[type="email"],
        input[type="password"],
        input[type="date"],
        input[type="number"],
        input[type="time"],
        /* 加入這行 */
        input[type="datetime-local"],
        /* 加入這行 */
        select,
        textarea {
            border: 1.5px solid var(--primary-dark) !important;
            border-radius: 15px !important;
            padding: 10px !important;
        }

        /* 針對所有輸入框、下拉選單、文字區域設定點擊效果 */
        .sechskies-form input:focus,
        .sechskies-form select:focus,
        .sechskies-form textarea:focus {
            /* 1. 移除瀏覽器預設的藍色粗框 */
            outline: none;

            /* 2. 更改邊框顏色 (改為你的主色或深色) */
            border-color: var(--primary) !important;

            /* 3. (選配) 增加一點發光效果，讓質感更好 */
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.2);

            /* 4. 保持圓角一致 */
            border-radius: 20px;
        }

        input[type="time"]::-webkit-calendar-picker-indicator,
        input[type="datetime-local"]::-webkit-calendar-picker-indicator {
            cursor: pointer;
            /* filter: invert(85%) sepia(50%) saturate(2000%) hue-rotate(1deg) brightness(105%) contrast(105%); */
            /* 這段濾鏡能把預設的黑色圖示轉為接近你的應援黃色 */
        }
    </style>
</head>

<body>

    <section class="page-hero">

                        <div>
