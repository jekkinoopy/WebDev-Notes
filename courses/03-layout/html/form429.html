<!doctype html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form 練習 - 努比的全端筆記</title>
    <link rel="stylesheet" href="../../../assets/css/main.css" />
    <link rel="stylesheet" href="../../../assets/css/course-note.css" />

    <style>
        /* 整體表單容器 */
        form {
            width: 90%;
            min-width: 800px;
            margin: 2rem auto;
            padding: 2rem;
            background: var(--gray-100);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        /* 2. 核心：統一所有標題與內容的距離 (Label 5px Input) */
        .sechskies-form p {
            display: flex !important;
            flex-direction: column !important;
            gap: 5px !important;
            margin-bottom: 25px !important;
        }

        .main-label {
            display: block !important;
            font-weight: 700 !important;
            color: var(--primary-dark) !important;
            margin: 0 !important;
            /* 移除外距由 p 的 gap 控制 */
        }

        /* 
        .sechskies-form {
            max-width: 820px;
            margin: 2.5rem auto;
            padding: 2.5rem;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 40px -10px rgba(59, 91, 224, 0.12),
                0 4px 6px -2px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--gray-200);
        } */

        /* Fieldset 美化 */
        fieldset {
            border: 1px solid var(--gray-200);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2.5rem;
            background: #fff;
        }

        legend {
            font-size: 1.35rem;
            font-weight: 800;
            color: var(--primary-dark);
            padding: 0 1.25rem;
            background: white;
            margin-left: 1rem;
        }

        /* Label + Input 統一間距 */
        .sechskies-form p,
        .sechskies-form>div {
            margin-bottom: 1.75rem;
        }

        .main-label {
            display: block;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 8px;
            font-size: 1.02rem;
        }

        /* 輸入框統一風格 */
        input[type="text"],
        input[type="password"],
        input[type="date"],
        input[type="number"],
        select,
        textarea {
            width: 100% !important;
            padding: 12px !important;
            border: 1.5px solid var(--primary-dark) !important;
            border-radius: 20px !important;
            font-size: 0.9rem !important;
            box-sizing: border-box !important;
            background-color: #fff !important;
            color: var(--primary-dark) !important;
        }


        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: #fff;
            border: 3px solid var(--primary);
            margin-top: -5px;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(91, 124, 255, 0.15);
            transform: translateY(-1px);
        }

        textarea {
            resize: vertical;
            min-height: 140px;
        }

        /* Range 滑桿美化 */
        input[type="range"] {
            width: 100%;
            accent-color: var(--primary);
            cursor: pointer;
        }

        /* 檔案上傳 */
        input[type="file"] {
            padding: 10px;
            border: 2px dashed var(--gray-200);
            border-radius: 16px;
            width: 100%;
            background: #fff;
        }

        input[type="file"]::file-selector-button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            margin-right: 12px;
        }

        /* 選項排版 */
        .option-row {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-top: 10px;
        }

        .option-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.02rem;
            cursor: pointer;
            user-select: none;
        }

        /* 6. 按鈕組樣式 */
        .submit {
            margin-top: 50px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* 送出 (藍底白字) */
        input[type="submit"] {
            background-color: var(--primary) !important;
            color: var(--gray-100) !important;
            border: 2px solid var(--primary) !important;
            padding: 15px !important;
            border-radius: 50px !important;
            font-weight: 600 !important;
            cursor: pointer;
            width: 100% !important;
            transition: 0.3s;
        }

        input[type="submit"]:hover {
            background-color: var(--primary-dark) !important;
            border-color: var(--primary-dark) !important;
        }

        /* 重置 (白底藍字) */
        input[type="reset"] {
            background-color: var(--gray-100) !important;
            color: var(--primary) !important;
            border: 2px solid var(--primary) !important;
            padding: 15px !important;
            border-radius: 50px !important;
            font-weight: 600 !important;
            cursor: pointer;
            width: 100% !important;
            transition: 0.3s;
        }

        input[type="reset"]:hover {
            background-color: #f0f7ff !important;
        }

        /* 7. Fieldset & Legend (左右藍線) */
        fieldset {
            border: 2px solid var(--primary);
            border-radius: 50px;
            padding: 2.5rem;
            margin-bottom: 3rem;
        }

        legend {
            font-weight: 900;
            color: var(--primary);
            padding: 0 15px;
            font-size: 1.2rem;
            border-left: 5px solid var(--primary);
            border-right: 5px solid var(--primary);
            margin: auto;
        }

        .option-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .option-item {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            white-space: nowrap;
        }

        input[type="radio"],
        input[type="checkbox"] {
            width: auto !important;
            margin: 0 !important;
        }

        /* 1. 統一所有「標題」與「內容」的間距：全部鎖死為 5px */
        .sechskies-form p,
        .sechskies-form fieldset>div,
        .sechskies-form fieldset {
            display: flex !important;
            flex-direction: column !important;
            gap: 5px !important;
            /* 標題與框框的距離 */
            margin-bottom: 20px !important;
            /* 每個大題之間的距離 */
        }

        /* 2. 修正標題本身的 margin，不讓它亂撐距離 */
        .main-label {
            margin: 0 !important;
            display: block !important;
        }

        /* 3. 解決選擇檔案按鈕太醜 */
        input[type="file"]::file-selector-button {
            background: var(--gray-100);
            color: var(--primary);
            border: 1px solid var(--primary);
            border-radius: 10px;
            padding: 5px 15px;
            cursor: pointer;
            font-weight: bold;
        }

        /* 
        input[type="file"] {
            border: 2px dashed var(--primary-dark) !important;
            padding: 10px !important;
            border-radius: 15px !important;
        } */

        /* 4. 喜愛程度顏色與高度 (Chrome 專用) */
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 10px;
            background: var(--primary) !important;
            border-radius: 5px;
            accent-color: var(--primary);
        }

        /* 5. 重置與送出並排：平分寬度、顏色對調 */
        /* .submit {
            display: flex !important;
            flex-direction: row !important;
            /* 橫向並排 */
        gap: 15px !important;
        margin-top: 30px !important;
        width: 50%;
        }

        .submit input {
            flex: 1 !important;
            padding: 15px !important;
            border-radius: 10px !important;
            font-weight: bold !important;
            cursor: pointer;
        }

        */ input[type="submit"] {
            width: 50%;
            background: var(--primary) !important;
            color: var(--gray-100) !important;
            border: none !important;
        }

        input[type="reset"] {
            background: var(--gray-100) !important;
            color: var(--primary) !important;
            border: 2px solid var(--primary) !important;
        }

        /* 6. 其他框線統一 */
        input[type="text"],
        input[type="password"],
        input[type="date"],
        input[type="number"],
        select,
        textarea {
            border: 1.5px solid var(--primary-dark) !important;
            border-radius: 15px !important;
            padding: 10px !important;
        }

        /* 小螢幕優化 */
        @media (max-width: 768px) {
            .sechskies-form {
                margin: 1rem;
                padding: 1.75rem;
                border-radius: 20px;
            }

            fieldset {
                padding: 1.5rem;
            }
        }
    </style>
</head>

<body>
    <header class="header">
        <nav class="navbar"></nav>
        <script src="../../../assets/js/nav-loader.js"></script>
    </header>

    <div class="ex">
        <div class="note-card">
            <div class="note-content">
                <form action="" class="sechskies-form">

                    <fieldset>
                        <legend>💛 第一階段：小黃身分驗證</legend>
                        <p>
                            <label class="main-label">應援小黃（暱稱）</label>
                            <input type="text" placeholder="輸入你的暱稱">
                        </p>
                        <p>
                            <label class="main-label">聯絡信箱</label>
                            <input type="text" placeholder="example@mail.com">
                        </p>
                        <p>
                            <label class="main-label">輸入你的密碼</label>
                            <input type="password" placeholder="••••••••">
                        </p>
                        <p>
                            <label class="main-label">入坑日期</label>
                            <input type="date">
                        </p>
                        <p>
                            <label class="main-label">入坑原因（最感動的一瞬間）</label>
                            <textarea rows="8" placeholder="分享你入坑的故事..."></textarea>
                        </p>
                    </fieldset>

                    <fieldset>
                        <legend>🎤 第二階段：見面會應援調查</legend>
                        <p>
                            <label class="main-label">本命成員</label>
                        <div class="option-row">
                            <label class="option-item"><input type="checkbox"> 殷志源</label>
                            <label class="option-item"><input type="checkbox"> 李宰鎮</label>
                            <label class="option-item"><input type="checkbox"> 金在德</label>
                            <label class="option-item"><input type="checkbox"> 姜成勳</label>
                            <label class="option-item"><input type="checkbox"> 高志溶</label>
                            <label class="option-item"><input type="checkbox"> 張水院</label>
                        </div>
                        </p>
                        <p>
                            <label class="main-label">最期待聽到的歌曲</label>
                            <select>
                                <option value="">請選擇歌曲</option>
                                <optgroup label="經典作品">
                                    <option>學園別曲 (학원별곡)</option>
                                    <option>男兒之路 (폼생폼사)</option>
                                </optgroup>
                            </select>
                        </p>
                        <p>
                            <label class="main-label">最期待的見面會環節</label>
                        <div class="option-row">
                            <label class="option-item"><input type="radio" name="event_poll"> 隨機舞蹈挑戰</label>
                            <label class="option-item"><input type="radio" name="event_poll"> 黑白水晶對抗賽</label>
                            <label class="option-item"><input type="radio" name="event_poll"> 時光膠囊對話</label>
                        </div>
                        </p>
                        <p>
                            <label class="main-label">入坑至今購買的專輯數量</label>
                            <input type="number" placeholder="0" min="0">
                        </p>
                    </fieldset>

                    <fieldset>
                        <legend>📂 第三階段：資格審核與提交</legend>
                        <div>
                            <label class="main-label">上傳你的小黃應援證物 (PDF/圖片)</label>
                            <input type="file" accept="image/*,.pdf">
                        </div>
                        <div>
                            <label class="main-label">對小黃的喜愛程度</label>
                            <input type="range" min="0" max="100" value="75">
                        </div>
                        <div>
                            <label class="main-label">必推!! 不能只有我入坑（推薦連結）</label>
                            <input type="url" placeholder="https://">
                        </div>

                        <div class="submit">
                            <input type="reset" value="重置表單">
                            <input type="submit" value="送出應援申請 💛">
                        </div>
                    </fieldset>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
