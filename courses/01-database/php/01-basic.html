 <div class="note-card">
    <h3>變數</h3>
    <pre><code><?php
        // 使用 Heredoc (<<<EOD) 定義字串，這樣裡面放單引號或雙引號都不會出錯
        $code = <<<'EOD'
        $a = 10;
        $b = 50;
        echo '$a=' . $a; // 單引號：不解析變數，顯示 $a=10
        echo "$b=" . $b; // 雙引號：解析變數，顯示 50=50
        EOD;

        echo htmlspecialchars($code); 
        ?></code></pre>

    <div class="code-section">
        <?php
        $a = 10;
        $b = 50;
        // 1. 這裡用單引號，會印出字串 "$a="
        echo '$a=' . $a . "<br>"; 
        
        // 2. 這裡用雙引號，PHP 會把 "$b" 換成 "50"，所以印出 "50="
        echo "$b=" . $b;
?>
    </div>
</div>
 <div class="note-card">
    <h3>變數交換練習：三杯水交換法）</h3>
    <pre><code><?php
        // 使用 Heredoc (<<<EOD) 定義字串，這樣裡面放單引號或雙引號都不會出錯
        $code = <<<'EOD'
                $temp=$a;   // A 的值先備份到 Temp，防止數據遺失
                $a=$b;      //$b的值 (50) 賦予給$a，第一步對調將 B 的內容移至 A
                $b=$temp;   //把原本備份在$temp的 10 拿出來，放進$b 完成最後對調


                echo '$a=' . $a;
                echo '<br>';
                echo '$b=' . $b;
        EOD;

        echo htmlspecialchars($code); 
        ?></code></pre>

    <div class="code-section">
                <?php 

                $temp=$a;
                $a=$b;
                $b=$temp;


                echo '$a=' . $a;
                echo '<br>';
                echo '$b=' . $b;

                ?>
    </div>
</div>
